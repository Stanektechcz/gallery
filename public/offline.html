<!doctype html>
<html lang="cs">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#1a1a2e">
    <title>Maki – offline</title>
    <style>
        :root { color-scheme: dark; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
        * { box-sizing: border-box; }
        body { margin: 0; min-height: 100dvh; display: grid; place-items: center; padding: 24px; background: radial-gradient(circle at 50% 20%, #29224b, #11101b 56%); color: #fff; }
        main { width: min(100%, 440px); padding: 28px; border: 1px solid #3b3656; border-radius: 24px; background: rgba(27, 24, 43, .94); box-shadow: 0 24px 80px rgba(0,0,0,.42); text-align: center; }
        img { width: 78px; height: 78px; border-radius: 22px; }
        h1 { margin: 20px 0 8px; font-size: 24px; }
        p { margin: 0; color: #bdb8cf; line-height: 1.55; }
        button { width: 100%; min-height: 48px; margin-top: 22px; border: 0; border-radius: 14px; background: #7367f0; color: #fff; font: inherit; font-weight: 700; cursor: pointer; }
        small { display: block; margin-top: 16px; color: #8f8aa4; }
    </style>
</head>
<body>
<main>
    <img src="/icons/pwa-192x192.png" alt="">
    <h1>Maki čeká na připojení</h1>
    <p>Jakmile budete znovu online, načte se aktuální stav galerie, plánů i společných dat ze serveru.</p>
    <button type="button" onclick="location.reload()">Zkusit znovu</button>
    <small>Rozpracované uploady ponechte otevřené, aby mohly po připojení pokračovat.</small>
</main>
</body>
</html>
